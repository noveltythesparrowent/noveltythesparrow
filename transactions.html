<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footprint | Transaction History</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a2a6c;
            --secondary-color: #b21f1f;
            --gray-light: #f5f7fa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--gray-light); min-height: 100vh; display: flex; flex-direction: column; }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            padding: 0 25px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .brand { font-size: 24px; font-weight: 700; letter-spacing: 1px; font-family: 'Montserrat', sans-serif; display: flex; align-items: center; gap: 10px; }
        .back-btn { color: white; text-decoration: none; display: flex; align-items: center; gap: 8px; font-size: 14px; opacity: 0.9; }
        .back-btn:hover { opacity: 1; }

        /* Container */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            width: 90%;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 { color: var(--primary-color); margin-bottom: 20px; font-weight: 600; }

        /* Table */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 15px; background: #f8f9fa; color: #666; font-weight: 600; font-size: 14px; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; color: #333; }
        tr:hover { background: #f9f9f9; }

        .badge { padding: 5px 10px; border-radius: 15px; font-size: 12px; font-weight: 500; text-transform: uppercase; }
        .badge-cash { background: #e8f5e9; color: #2e7d32; }
        .badge-momo { background: #fff3e0; color: #ef6c00; }
        .badge-card { background: #e3f2fd; color: #1565c0; }

        .btn-reprint {
            padding: 6px 12px; border: 1px solid var(--primary-color); color: var(--primary-color);
            background: white; border-radius: 4px; cursor: pointer; font-size: 12px; transition: 0.2s;
        }
        .btn-reprint:hover { background: var(--primary-color); color: white; }

        .empty-state { text-align: center; padding: 40px; color: #888; }

        /* Footer */
        footer {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            padding: 8px 25px;
            display: flex;
            justify-content: center;
            font-size: 12px;
            color: white;
            margin-top: auto;
        }

        /* Pagination */
        .pagination-controls { display: flex; justify-content: flex-end; align-items: center; gap: 15px; margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; }
        .btn-page { padding: 8px 16px; border: 1px solid #ddd; background: white; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-page:hover:not(:disabled) { background: #f5f5f5; border-color: #ccc; }
        .btn-page:disabled { opacity: 0.5; cursor: not-allowed; }
        .page-info { font-size: 14px; color: #666; }
        .limit-select { padding: 8px; border: 1px solid #ddd; border-radius: 6px; outline: none; font-size: 14px; cursor: pointer; }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            header { padding: 0 15px; height: 60px; }
            .brand { font-size: 14px; gap: 5px; white-space: nowrap; }
            .brand img { width: 120px !important; height: 25px !important; }
            .back-btn { font-size: 0; }
            .back-btn i { font-size: 18px; }

            .container { margin: 20px auto; padding: 20px; }
            .pagination-controls { flex-direction: column; align-items: stretch; gap: 10px; }
            .pagination-controls > div { justify-content: space-between; }
            .page-info { text-align: center; }

            .transactions-table thead { display: none; }
            .transactions-table tbody tr {
                display: block;
                border: 1px solid #e2e8f0;
                border-radius: 10px;
                margin-bottom: 12px;
                box-shadow: 0 2px 6px rgba(0,0,0,0.05);
                background: white;
            }
            .transactions-table td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 9px 14px;
                border-bottom: 1px solid #f1f5f9;
                font-size: 13px;
                text-align: right;
            }
            .transactions-table td:last-child { border-bottom: none; }
            .transactions-table td::before {
                content: attr(data-label);
                font-weight: 600;
                font-size: 11px;
                color: #888;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                flex-shrink: 0;
                min-width: 100px;
                margin-right: 10px;
                text-align: left;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand"><img src="logo.png" style="width: 200px; height: 40px; object-fit: contain;"> THE SPARROW ENT</div>
        <a href="pos" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Register</a>
    </header>

    <div class="container">
        <h2>Transaction History</h2>
        <div id="shiftInfo" style="margin-bottom: 20px; padding: 10px; background: #f0f8ff; border-radius: 5px; display: none;">
            <strong>Current Shift:</strong> <span id="shiftStatus"></span>
        </div>
        <table class="transactions-table">
            <thead>
                <tr>
                    <th>Date & Time</th>
                    <th>Receipt #</th>
                    <th>Payment Method</th>
                    <th>Amount</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="historyTable">
                <tr><td colspan="5" class="empty-state">Loading transactions...</td></tr>
            </tbody>
        </table>

        <!-- Pagination Controls -->
        <div class="pagination-controls">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 14px; color: #666;">Rows per page:</span>
                <select id="rowsPerPage" class="limit-select" onchange="changeRowsPerPage()">
                    <option value="10">10</option>
                    <option value="25">25</option>
                    <option value="100">100</option>
                </select>
            </div>
            <span id="pageInfo" class="page-info">Page 1 of 1</span>
            <button class="btn-page" id="btnPrev" onclick="changePage(-1)" disabled><i class="fas fa-chevron-left"></i></button>
            <button class="btn-page" id="btnNext" onclick="changePage(1)" disabled><i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <footer>
        <div>&copy; 2026 Footprint Retail Systems. All rights reserved.</div>
    </footer>

    <script>
        let allTransactions = [];
        let currentPage = 1;
        let rowsPerPage = 10;
        let currentShift = null;

        async function loadShiftInfo() {
            try {
                const token = localStorage.getItem('authToken');
                const res = await fetch('/api/shifts/active', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.ok) {
                    const data = await res.json();
                    if (data.active && data.shift) {
                        currentShift = data.shift;
                        const shiftInfo = document.getElementById('shiftInfo');
                        const shiftStatus = document.getElementById('shiftStatus');
                        
                        const startTime = new Date(data.shift.start_time).toLocaleString();
                        shiftStatus.textContent = `Started at ${startTime}`;
                        shiftInfo.style.display = 'block';
                    }
                }
            } catch (err) {
                console.error('Error loading shift info:', err);
            }
        }

        async function loadHistory() {
            try {
                const token = localStorage.getItem('authToken');
                const res = await fetch('/transactions/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.status === 401) {
                    window.location.href = '/login';
                    return;
                }
                
                if (!res.ok) throw new Error("Failed to fetch history");

                allTransactions = await res.json();
                
                // Update empty state message if no active shift
                if (!currentShift && allTransactions.length === 0) {
                    document.getElementById('historyTable').innerHTML = 
                        '<tr><td colspan="5" class="empty-state">No active shift. Start a new shift to begin recording transactions.</td></tr>';
                } else if (currentShift && allTransactions.length === 0) {
                    document.getElementById('historyTable').innerHTML = 
                        '<tr><td colspan="5" class="empty-state">No transactions in current shift yet.</td></tr>';
                } else {
                    renderTable();
                }
            } catch (err) {
                console.error(err);
                document.getElementById('historyTable').innerHTML = '<tr><td colspan="5" class="empty-state">Error loading history.</td></tr>';
            }
        }

        function renderTable() {
            const tbody = document.getElementById('historyTable');
            tbody.innerHTML = '';

            if (!Array.isArray(allTransactions) || allTransactions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No transactions found.</td></tr>';
                updatePaginationInfo();
                return;
            }

            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const paginatedItems = allTransactions.slice(start, end);

            paginatedItems.forEach(trx => {
                const date = new Date(trx.created_at).toLocaleString();
                let badgeClass = 'badge-cash';
                if (trx.payment_method === 'momo') badgeClass = 'badge-momo';
                if (trx.payment_method === 'card') badgeClass = 'badge-card';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td data-label="Date & Time">${date}</td>
                    <td data-label="Receipt #">${trx.receipt_number}</td>
                    <td data-label="Payment Method"><span class="badge ${badgeClass}">${trx.payment_method}</span></td>
                    <td data-label="Amount" style="font-weight:bold;">₵${parseFloat(trx.total_amount).toFixed(2)}</td>
                    <td data-label="Action"></td>
                `;
                
                const btn = document.createElement('button');
                btn.className = 'btn-reprint';
                btn.innerHTML = '<i class="fas fa-print"></i> Reprint';
                btn.onclick = () => reprint(trx);
                
                tr.lastElementChild.appendChild(btn);
                tbody.appendChild(tr);
            });
            
            updatePaginationInfo();
        }

        function updatePaginationInfo() {
            const totalItems = allTransactions.length;
            const totalPages = Math.ceil(totalItems / rowsPerPage) || 1;
            
            document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages} (${totalItems} items)`;
            document.getElementById('btnPrev').disabled = currentPage === 1;
            document.getElementById('btnNext').disabled = currentPage === totalPages || totalPages === 0;
        }

        function changePage(delta) {
            currentPage += delta;
            renderTable();
        }

        function changeRowsPerPage() {
            rowsPerPage = parseInt(document.getElementById('rowsPerPage').value);
            currentPage = 1;
            renderTable();
        }

        function reprint(trx) {
            window.location.href = `receipt?id=${trx.receipt_number || trx.id}`;
        }

        // Load shift info first, then transaction history
        loadShiftInfo().then(() => {
            loadHistory();
        });
    </script>
</body>
</html>
