<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SPARROW ENT | User Profile</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a2a6c;
            --secondary-color: #b21f1f;
            --gray-light: #f5f7fa;
            --text-color: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--gray-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            padding: 0 25px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .brand {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            opacity: 0.9;
            transition: 0.2s;
        }

        .back-btn:hover {
            opacity: 1;
            transform: translateX(-3px);
        }

        /* Main Container */
        .container {
            max-width: 900px;
            margin: 40px auto;
            width: 90%;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        /* Profile Info Side */
        .profile-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .avatar-large {
            width: 100px;
            height: 100px;
            background: #e3f2fd;
            color: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 15px;
        }

        .user-name {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-color);
        }

        .user-role {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-list {
            margin-top: 30px;
        }

        .info-item {
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            font-size: 12px;
            color: #888;
            display: block;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 15px;
            color: #333;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Security Side */
        h3 {
            color: var(--primary-color);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
        }

        .btn-save {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            width: 100%;
            transition: 0.3s;
        }

        .btn-save:hover {
            opacity: 0.9;
        }

        .logout-section {
            margin-top: 30px;
            text-align: center;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .btn-logout {
            color: var(--secondary-color);
            background: none;
            border: 1px solid var(--secondary-color);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-logout:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* Notification Toast */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background-color: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            font-size: 14px;
            font-weight: 500;
        }

        .notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(10px);
        }

        .notification.success {
            background-color: #2e7d32;
        }

        .notification.error {
            background-color: #c62828;
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding: 15px;
            text-align: center;
            color: white;
            font-size: 12px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                margin: 20px auto;
                gap: 20px;
            }

            header {
                padding: 0 15px;
                height: 60px;
            }

            .brand {
                font-size: 16px;
                gap: 5px;
            }

            .brand img {
                width: 120px !important;
                height: 25px !important;
            }

            .back-btn {
                font-size: 0;
            }

            .back-btn i {
                font-size: 18px;
            }

            .card {
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <div id="notification" class="notification"></div>

    <header>
        <div class="brand"><img src="logo.png" style="width: 200px; height: 40px; object-fit: contain;"> THE SPARROW ENT</div>
        <a href="#" onclick="goBack()" class="back-btn"><i class="fas fa-arrow-left"></i> Back to App</a>
    </header>

    <div class="container">
        <!-- Left: User Details -->
        <div class="card">
            <div class="profile-header">
                <div class="avatar-large"><i class="fas fa-user"></i></div>
                <div class="user-name" id="displayName">Loading...</div>
                <div class="user-role" id="displayRole">...</div>
            </div>
            <div class="info-list">
                <div class="info-item">
                    <span class="info-label">Email Address</span>
                    <div class="info-value" id="displayEmail">...</div>
                </div>
                <div class="info-item">
                    <span class="info-label">Assigned Store</span>
                    <div class="info-value">
                        <i class="fas fa-map-marker-alt" style="color: var(--secondary-color);"></i>
                        <span id="displayStore">...</span>
                    </div>
                </div>
            </div>
            <div class="logout-section">
                <button class="btn-logout" onclick="logout()">Sign Out</button>
            </div>
        </div>

        <!-- Right: Security Settings -->
        <div class="card">
            <h3>Security Settings</h3>
            <form onsubmit="updatePassword(event)">
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" id="currentPass" placeholder="Enter current password" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPass" placeholder="Enter new password" required>
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirmPass" placeholder="Confirm new password" required>
                </div>
                <button type="submit" class="btn-save">Update Password</button>
            </form>
        </div>
    </div>

    <footer>
        © 2026 Footprint Retail Systems
    </footer>

    <script>
        const userStr = localStorage.getItem('currentUser');
        if (!userStr) window.location.href = '/';
        const user = JSON.parse(userStr);

        // Handle role-based redirection if needed
        if (user.role === 'admin') {
            // Admin can stay on profile page
        } else if (user.role === 'cashier' || user.role === 'teller') {
            // Cashiers/tellers can stay on profile page
        } else {
            // Unknown role, redirect to login
            window.location.href = 'login';
        }

        document.getElementById('displayName').textContent = user.name;
        document.getElementById('displayRole').textContent = user.role;
        document.getElementById('displayEmail').textContent = user.email;
        document.getElementById('displayStore').textContent = user.store_location || 'Not Assigned';

        async function goBack() {
            const token = localStorage.getItem('authToken');
            if (user.role === 'admin' || user.role === 'manager') {
                window.location.href = 'dashboard';
            } else {
                // For cashiers, check if a shift is active
                try {
                    const res = await fetch('/api/shifts/active', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        const shiftData = await res.json();
                        window.location.href = shiftData.active ? 'pos' : 'open-shift';
                    } else {
                        window.location.href = 'open-shift'; // Default
                    }
                } catch (e) {
                    window.location.href = 'open-shift'; // Default on error
                }
            }
        }
        async function logout() {
            try {
                const token = localStorage.getItem('authToken');
                await fetch('/api/logout', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
            } catch (e) { }
            localStorage.clear();
            localStorage.removeItem('currentUser'); // Cleanup
            window.location.href = '/login';
        }

        function showNotification(message, type) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.className = `notification show ${type}`;
            setTimeout(() => {
                notif.className = 'notification';
            }, 3000);
        }

        async function updatePassword(e) {
            e.preventDefault();

            const currentPass = document.getElementById('currentPass').value;
            const newPass = document.getElementById('newPass').value;
            const confirmPass = document.getElementById('confirmPass').value;
            const btn = document.querySelector('.btn-save');

            if (newPass !== confirmPass) {
                showNotification("New passwords do not match!", "error");
                return;
            }

            btn.disabled = true;
            btn.textContent = "Updating...";

            try {
                const token = localStorage.getItem('authToken');
                const res = await fetch('/api/update-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ currentPassword: currentPass, newPassword: newPass })
                });

                const data = await res.json();

                if (res.ok) {
                    showNotification(data.message, "success");
                    e.target.reset();
                } else {
                    showNotification(data.message, "error");
                }
            } catch (err) {
                showNotification("Connection error", "error");
            } finally {
                btn.disabled = false;
                btn.textContent = "Update Password";
            }
        }
    </script>
</body>

</html>
