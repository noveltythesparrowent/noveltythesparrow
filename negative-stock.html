<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footprint | Negative Stock Analysis</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1a2a6c;
            --secondary: #b21f1f;
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #333;
            --danger: #c62828;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { color: var(--primary); font-size: 24px; }
        .back-btn { text-decoration: none; color: var(--primary); font-weight: 600; display: flex; align-items: center; gap: 8px; }

        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid var(--primary); }
        .stat-card.debt { border-left-color: var(--secondary); }
        .stat-card h3 { font-size: 14px; color: #666; text-transform: uppercase; margin-bottom: 10px; }
        .stat-card .value { font-size: 28px; font-weight: 800; color: var(--primary); }
        .stat-card.debt .value { color: var(--secondary); }

        .analysis-container { background: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }
        .table-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #f9fafb; padding: 15px; text-align: left; font-size: 13px; color: #666; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        tr:hover { background: #fcfcfc; }

        .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-danger { background: #ffebee; color: var(--danger); }
        
        .units-owed { font-weight: 700; color: var(--danger); }
        .empty-state { padding: 50px; text-align: center; color: #999; }

        .refresh-btn { 
            background: var(--primary); color: white; border: none; padding: 10px 20px; 
            border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px;
        }
        .refresh-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <a href="/inventory" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Inventory</a>
            <h1>Negative Stock Management</h1>
        </div>
        <button class="refresh-btn" onclick="fetchAnalysis()">
            <i class="fas fa-sync-alt"></i> Refresh Analysis
        </button>
    </div>

    <div class="summary-grid">
        <div class="stat-card">
            <h3>Items in Negative</h3>
            <div class="value" id="totalItems">0</div>
        </div>
        <div class="stat-card">
            <h3>Total Units Owed</h3>
            <div class="value" id="totalUnits">0</div>
        </div>
        <div class="stat-card debt">
            <h3>Estimated Debt Value</h3>
            <div class="value" id="totalDebt">₵0.00</div>
        </div>
    </div>

    <div class="analysis-container">
        <div class="table-header">
            <h2 style="font-size: 18px; color: var(--primary);">Negative Stock Breakdown</h2>
            <span style="font-size: 12px; color: #888;">* Debt value calculated based on product cost price</span>
        </div>
        <div id="tableContent">
            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Category</th>
                        <th>Current Stock</th>
                        <th>Units Owed</th>
                        <th>Cost Price</th>
                        <th>Debt Value</th>
                    </tr>
                </thead>
                <tbody id="analysisList">
                    <!-- Data injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function fetchAnalysis() {
            const token = localStorage.getItem('authToken');
            if (!token) {
                window.location.href = '/login';
                return;
            }

            try {
                const response = await fetch('/api/inventory/negative-analysis', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                if (!response.ok) throw new Error(data.message);

                renderData(data);
            } catch (err) {
                console.error('Error:', err);
                alert('Failed to load analysis: ' + err.message);
            }
        }

        function renderData(data) {
            // Update Summary
            document.getElementById('totalItems').textContent = data.summary.negative_items || 0;
            document.getElementById('totalUnits').textContent = data.summary.total_units_owed || 0;
            document.getElementById('totalDebt').textContent = `₵${parseFloat(data.summary.total_debt_value || 0).toFixed(2)}`;

            const list = document.getElementById('analysisList');
            if (!data.items || data.items.length === 0) {
                document.getElementById('tableContent').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-check-circle" style="font-size: 48px; color: #2e7d32; margin-bottom: 10px;"></i>
                        <p>No negative stock items found. Your inventory is healthy!</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = data.items.map(item => `
                <tr>
                    <td>
                        <div style="font-weight: 600;">${item.name}</div>
                        <div style="font-size: 11px; color: #888;">${item.barcode}</div>
                    </td>
                    <td>${item.category || 'General'}</td>
                    <td><span class="badge badge-danger">${item.stock}</span></td>
                    <td class="units-owed">${item.units_owed}</td>
                    <td>₵${parseFloat(item.cost_price || 0).toFixed(2)}</td>
                    <td style="font-weight: 700; color: var(--secondary);">₵${parseFloat(item.debt_value || 0).toFixed(2)}</td>
                </tr>
            `).join('');
        }

        // Initial Load
        fetchAnalysis();
    </script>
</body>
</html>
