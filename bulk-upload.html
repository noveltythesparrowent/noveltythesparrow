<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Product Upload</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 40px; background: #f4f4f9; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        h2 { color: #1a2a6c; margin-top: 0; text-align: center; }
        .description { color: #666; font-size: 14px; margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input[type="file"] { width: 100%; padding: 12px; border: 2px dashed #ddd; border-radius: 8px; background: #fafafa; cursor: pointer; }
        input[type="file"]:hover { border-color: #1a2a6c; background: #f0f4ff; }
        button { background: #1a2a6c; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; font-weight: 600; transition: background 0.2s; }
        button:hover { background: #2a3a7c; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-size: 14px; line-height: 1.5; }
        .success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .error { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        .back-link { display: block; margin-top: 20px; text-align: center; color: #666; text-decoration: none; font-size: 14px; }
        .back-link:hover { color: #1a2a6c; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📦 Bulk Stock Upload</h2>
        <p class="description">Upload an Excel file (.xlsx) with columns:<br><strong>Product Name, Category, Cost (₵), Markup, Price (₵), Current Stock, Batch Number, Expiry Date, Selling Unit, Packaging Unit, Items per Package, Reorder Level</strong></p>
        
        <div class="form-group">
            <label>Select Excel File</label>
            <input type="file" id="fileInput" accept=".xlsx, .xls, .csv">
        </div>
        
        <button onclick="uploadFile()">Upload Products</button>
        
        <div id="status"></div>
        <a href="/dashboard" class="back-link">← Back to Dashboard</a>
    </div>

    <script>
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const statusDiv = document.getElementById('status');
            const btn = document.querySelector('button');
            
            if (!fileInput.files[0]) {
                alert('Please select a file first');
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            btn.disabled = true;
            btn.innerText = 'Uploading...';
            statusDiv.style.display = 'none';

            try {
                const token = localStorage.getItem('authToken');
                const res = await fetch('/api/products/bulk', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                const data = await res.json();
                
                statusDiv.style.display = 'block';
                if (data.success) {
                    statusDiv.className = 'success';
                    statusDiv.innerHTML = `<strong>✅ Upload Complete!</strong><br>Successfully Added: ${data.results.success}<br>Failed: ${data.results.failed}`;
                    if (data.results.errors.length > 0) {
                        const escapeHtml = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                        statusDiv.innerHTML += '<br><br><strong>Errors:</strong><br>' + data.results.errors.map(escapeHtml).join('<br>');
                    }
                } else {
                    statusDiv.className = 'error';
                    statusDiv.innerText = '❌ ' + (data.message || 'Upload failed');
                }
            } catch (err) {
                statusDiv.style.display = 'block';
                statusDiv.className = 'error';
                statusDiv.innerText = '❌ System Error: ' + err.message;
            } finally {
                btn.disabled = false;
                btn.innerText = 'Upload Products';
            }
        }
    </script>
</body>
</html>
